    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.sora.kaigi.tvos.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "3"

  KaigiTVOSUITests:
