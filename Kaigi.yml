    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.sora.kaigi.tvos
        PRODUCT_NAME: KaigiTVOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kaigi tvOS
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Kaigi needs microphone access for meetings."
        TARGETED_DEVICE_FAMILY: "3"

  KaigiTVOSTests:
