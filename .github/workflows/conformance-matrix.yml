          - Web Safari
          - Web Firefox
          - macOS
          - iOS
          - iPadOS
          - visionOS
          - Windows
          - Android
          - Linux
    steps:
      - uses: actions/checkout@v4
      - name: Ensure platform is present in parity matrix
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq "\\|[[:space:]]*${{ matrix.platform }}[[:space:]]*\\|" docs/parity-matrix.md

  scenario-contract-matrix:
