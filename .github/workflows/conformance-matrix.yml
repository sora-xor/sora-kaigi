name: Conformance Matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - roadmap.md
      - clients/**
      - docs/**
      - scripts/**
      - .github/workflows/conformance-matrix.yml
  push:
    branches:
      - master
    paths:
      - roadmap.md
      - clients/**
      - docs/**
      - scripts/**
      - .github/workflows/conformance-matrix.yml

jobs:
  validate-doc-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required roadmap docs exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "docs/av-baseline-profiles.json"
            "docs/critical-defects.json"
            "docs/ga-approvals.json"
            "docs/hardening-gates.json"
            "docs/hdr-transport-profiles.json"
            "docs/hdr-target-device-results.json"
            "docs/parity-status-contract.json"
            "docs/parity-status-waivers.json"
            "docs/parity-waiver-policy.json"
            "docs/client-app-workspaces.json"
            "docs/client-release-tracks.json"
            "docs/client-fallback-drills.json"
            "docs/client-fallback-drill-results.json"
            "docs/client-release-manifest.json"
            "docs/client-release-manifest-input.template.json"
            "docs/client-release-readiness-gates.json"
            "docs/client-rollback-manifest.json"
            "docs/fixtures/waivers/manifest.json"
            "docs/platform-blockers.json"
            "roadmap.md"
            "docs/media-capability-profiles.json"
            "docs/parity-matrix.md"
            "docs/platform-contract.json"
            "docs/protocol-vnext.md"
            "docs/release-playbook.md"
            "docs/rollback-playbook.md"
            "docs/screen-share-constraints.json"
            "docs/test-plan.md"
          )
          for file in "${required[@]}"; do
            [[ -f "$file" ]] || { echo "Missing required file: $file"; exit 1; }
          done
      - name: Validate workflow matrix sync with docs contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_ci_contract_sync.py
      - name: Validate required sections
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq "^## Milestones and Exit Criteria" roadmap.md
          grep -Eq "^## Core Meeting Capability Matrix" docs/parity-matrix.md
          grep -Fq "Frozen on 2026-02-15" docs/parity-matrix.md
          grep -Eq "^## New Control Frames \(Frozen\)" docs/protocol-vnext.md
          grep -Eq "^## Join Link Schema .* \(Frozen\)" docs/protocol-vnext.md
          grep -Eq "^## Frozen Role/Permission Model" docs/protocol-vnext.md
          grep -Fq "Frozen on 2026-02-15" docs/protocol-vnext.md
          grep -Eq "^## Suite A: Protocol Conformance" docs/test-plan.md
          grep -Fq "Frozen on 2026-02-15" docs/test-plan.md
          grep -Eq "^# Release Playbook" docs/release-playbook.md
          grep -Eq "^## Native Release Tracks" docs/release-playbook.md
          grep -Eq "^## IPFS Web Release" docs/release-playbook.md
          grep -Eq "^# Rollback Playbook" docs/rollback-playbook.md
          grep -Eq "^## Native Rollback Tracks" docs/rollback-playbook.md
          grep -Eq "^## IPFS Web Rollback" docs/rollback-playbook.md
          grep -Fq '"schema": "kaigi-av-baseline-profiles/v1"' docs/av-baseline-profiles.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/av-baseline-profiles.json
          grep -Fq '"schema": "kaigi-hdr-transport-profiles/v1"' docs/hdr-transport-profiles.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/hdr-transport-profiles.json
          grep -Fq '"schema": "kaigi-hdr-target-device-results/v1"' docs/hdr-target-device-results.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/hdr-target-device-results.json
          grep -Fq '"schema": "kaigi-parity-status-contract/v1"' docs/parity-status-contract.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/parity-status-contract.json
          grep -Fq '"schema": "kaigi-parity-status-waivers/v1"' docs/parity-status-waivers.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/parity-status-waivers.json
          grep -Fq '"schema": "kaigi-parity-waiver-policy/v1"' docs/parity-waiver-policy.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/parity-waiver-policy.json
          grep -Fq '"schema": "kaigi-client-app-workspaces/v1"' docs/client-app-workspaces.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-app-workspaces.json
          grep -Fq '"schema": "kaigi-client-release-tracks/v1"' docs/client-release-tracks.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-release-tracks.json
          grep -Fq '"schema": "kaigi-client-fallback-drills/v1"' docs/client-fallback-drills.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-fallback-drills.json
          grep -Fq '"schema": "kaigi-client-fallback-drill-results/v1"' docs/client-fallback-drill-results.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-fallback-drill-results.json
          grep -Fq '"schema": "kaigi-client-release-manifest/v1"' docs/client-release-manifest.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-release-manifest.json
          grep -Fq '"schema": "kaigi-client-release-readiness-gates/v1"' docs/client-release-readiness-gates.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-release-readiness-gates.json
          grep -Fq '"schema": "kaigi-client-rollback-manifest/v1"' docs/client-rollback-manifest.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/client-rollback-manifest.json
          grep -Fq '"schema": "kaigi-parity-waiver-fixture-manifest/v1"' docs/fixtures/waivers/manifest.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/fixtures/waivers/manifest.json
          grep -Fq '"schema": "kaigi-hardening-gates/v1"' docs/hardening-gates.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/hardening-gates.json
          grep -Fq '"schema": "kaigi-ga-approvals/v1"' docs/ga-approvals.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/ga-approvals.json
          grep -Fq '"schema": "kaigi-platform-blockers/v1"' docs/platform-blockers.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/platform-blockers.json
          grep -Fq '"schema": "kaigi-critical-defects/v1"' docs/critical-defects.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/critical-defects.json
          grep -Fq '"schema": "kaigi-screen-share-constraints/v1"' docs/screen-share-constraints.json
          grep -Fq '"frozen_at": "2026-02-15"' docs/screen-share-constraints.json
      - name: Validate frozen platform contract artifact schema
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          with open("docs/platform-contract.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          assert payload.get("schema") == "kaigi-platform-contract/v1"
          assert payload.get("frozen_at") == "2026-02-15"
          contracts = payload.get("contracts")
          assert isinstance(contracts, list) and len(contracts) == 10
          platforms = {contract.get("platform") for contract in contracts}
          assert len(platforms) == 10
          required = {
              "WebChromium", "WebSafari", "WebFirefox",
              "MacOS", "IOS", "IPadOS", "VisionOS", "Windows", "Android", "Linux",
          }
          assert platforms == required
          PY
