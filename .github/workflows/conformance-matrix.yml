  run-rust-conformance-tests:
    needs: validate-doc-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run conformance crate tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p kaigi-wire -p kaigi-hub-echo -p kaigi-cli -p kaigi-platform-contract
      - name: Verify frozen platform contract artifact
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/export_platform_contract_json.sh target/conformance/platform-contract.generated.json
          diff -u docs/platform-contract.json target/conformance/platform-contract.generated.json
      - name: Run conformance evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/run_conformance_evidence_bundle.sh
      - name: Upload SCALE-004 soak evidence
        uses: actions/upload-artifact@v4
        with:
          name: scale004-soak-evidence
          path: |
            target/conformance/scale004-soak-report.json
            target/conformance/scale004-soak.log
          if-no-files-found: error
      - name: Upload security/protocol smoke evidence
        uses: actions/upload-artifact@v4
