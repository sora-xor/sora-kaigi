  protocol-contract-matrix:
    needs: validate-doc-contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frame:
          - ModerationSigned
          - RoleGrant
          - RoleRevoke
          - PermissionsSnapshot
          - SessionPolicy
          - DeviceCapability
          - MediaProfileNegotiation
          - RecordingNotice
          - E2EEKeyEpoch
          - KeyRotationAck
          - ParticipantPresenceDelta
    steps:
      - uses: actions/checkout@v4
      - name: Ensure protocol frame is documented
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq "\\b${{ matrix.frame }}\\b" docs/protocol-vnext.md

  join-link-contract-matrix:
    needs: validate-doc-contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        param:
          - "`v`"
          - "`channel`"
          - "`exp`"
          - "`nonce`"
          - "`sig`"
    steps:
      - uses: actions/checkout@v4
      - name: Ensure join-link security params are documented
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq "${{ matrix.param }}" docs/protocol-vnext.md

  platform-parity-matrix:
    needs: validate-doc-contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
